name: Build All Plugins

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}

      - name: ⚙️ Give Permission to gradlew
        run: chmod +x gradlew
        
      - name: Build all modules
        run: ./gradlew build --no-daemon

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: skyblock-plugins
          path: '**/build/libs/*.jar'
          retention-days: 30
